<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPI Data Processor</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .chrome-blue { color: #1a73e8; }
        .bg-chrome-blue { background-color: #1a73e8; }
        .btn-primary { @apply bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition; }
    </style>

    <!-- Import Map for Firebase (No Bundler Needed) -->
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
          "firebase/analytics": "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js"
        }
      }
    </script>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Loading Overlay -->
    <div id="loading-screen" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center hidden">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
        <p class="text-gray-500 animate-pulse">Loading system...</p>
    </div>

    <!-- Login Screen -->
    <div id="login-screen" class="hidden flex-1 flex items-center justify-center">
        <div class="bg-white p-8 rounded-xl shadow-xl w-96 border border-gray-100">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-gray-800">KPI Processor</h1>
                <p class="text-gray-400 text-sm">Sign in to continue</p>
            </div>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Email</label>
                    <input type="email" id="email" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:border-blue-500 focus:ring-blue-500" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Password</label>
                    <input type="password" id="password" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:border-blue-500 focus:ring-blue-500" required>
                </div>
                <button type="submit" class="w-full bg-chrome-blue text-white py-2 px-4 rounded-md hover:bg-blue-700 transition duration-200 font-medium">
                    Login
                </button>
            </form>
        </div>
    </div>

    <!-- Main Application (Hidden by default) -->
    <div id="app-screen" class="hidden flex-1 flex flex-col h-full">
        <!-- Navbar -->
        <nav class="bg-white shadow-sm border-b border-gray-200 z-10">
            <div class="max-w-7xl mx-auto px-4">
                <div class="flex justify-between h-16">
                    <div class="flex items-center gap-8">
                        <span class="text-xl font-bold text-blue-600">KPI System</span>
                        <div class="hidden md:flex space-x-4">
                            <button data-page="upload" class="nav-btn text-gray-600 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium">Upload Files</button>
                            <button data-page="report" class="nav-btn text-gray-600 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium">Reports</button>
                            <button data-page="config" id="nav-config" class="hidden nav-btn text-gray-600 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium">Config</button>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="text-right hidden sm:block">
                            <p id="user-name" class="text-sm font-medium text-gray-800">User</p>
                            <p id="user-role" class="text-xs text-gray-500">Role</p>
                        </div>
                        <button id="logout-btn" class="text-red-500 hover:text-red-700 text-sm font-medium">Logout</button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Content Area -->
        <main id="content-area" class="flex-1 overflow-auto p-6 bg-gray-50">
            <!-- Content will be injected here by app.js -->
            <div class="text-center text-gray-500 mt-20">Select a menu to start</div>
        </main>
    </div>

    <!-- External Libraries (SheetJS & JSZip) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <!-- App Modules -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
