<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPI System V9 (Final)</title>
    
    <!-- 1. Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<body class="h-screen flex flex-col overflow-hidden">

    <!-- Loading Screen -->
    <div id="loading-screen" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center">

    <!-- Login Screen -->
    <div id="login-screen" class="hidden fixed inset-0 bg-gray-100 z-40 flex items-center justify-center">

                <h1 class="text-3xl font-bold text-gray-800 mb-2">KPI Login</h1>
                <p class="text-gray-400 text-sm">เข้าสู่ระบบเพื่อจัดการข้อมูล</p>
            </div>
            <form id="login-form" class="space-y-4">
                <input type="email" id="email" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Email" value="admin@kpi.com" required>
                <input type="password" id="password" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Password" value="admin1234" required>
                <button type="submit" class="w-full bg-chrome text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition shadow-lg">เข้าสู่ระบบ</button>
            </form>

    <!-- App Main Screen -->
    <div id="app-screen" class="hidden flex-1 flex flex-col h-full">
        <!-- Navbar -->
        <nav class="bg-white shadow-sm border-b h-16 shrink-0 px-6 flex justify-between items-center z-10">
            <div class="flex items-center gap-3 font-bold text-xl text-gray-800">
                <div class="w-8 h-8 bg-chrome rounded text-white flex items-center justify-center text-sm">K</div>
                KPI Processor
            </div>
            
            <!-- Main Menu -->
            <div class="flex gap-2 bg-gray-100 p-1 rounded-lg">
                <button onclick="ui.nav('upload')" id="nav-upload" class="px-6 py-1.5 rounded-md text-sm font-bold transition">Upload</button>
                <button onclick="ui.nav('report')" id="nav-report" class="px-6 py-1.5 rounded-md text-sm font-bold transition">Report</button>
            </div>

            <div class="flex items-center gap-4">
                <span id="user-role" class="text-xs font-bold bg-blue-100 text-blue-700 px-2 py-1 rounded">Admin</span>
                <button onclick="authService.logout()" class="text-gray-400 hover:text-red-500">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                </button>
            </div>
        </nav>

        <!-- Dynamic Content -->
        <main id="content-area" class="flex-1 overflow-auto p-6 bg-slate-50"></main>
    </div>

<script>
/**
 * ==========================================
 * 1. CONFIGURATION & SERVICES
 * ==========================================
 */
const firebaseConfig = {
  apiKey: "AIzaSyCIAnpjvT2k6K-54tGx8MLSzXLXtVQCGDk",
  authDomain: "daily-report-c7e73.firebaseapp.com",
  projectId: "daily-report-c7e73",
  storageBucket: "daily-report-c7e73.firebasestorage.app",
  messagingSenderId: "784313419402",
  appId: "1:784313419402:web:4e31ceccb3caaf4c830f73"
};

// Failsafe: Auto-bypass loading if blocked
setTimeout(() => {
    if(!document.getElementById('loading-screen').classList.contains('hidden')){
        document.getElementById('loading-screen').classList.add('hidden');
        document.getElementById('login-screen').classList.remove('hidden');
    }
}, 2500);

try { if(!firebase.apps.length) firebase.initializeApp(firebaseConfig); } catch(e){console.error(e);}
const auth = firebase.auth();
const db = firebase.firestore();

const dbService = {
    cleanNum: (val) => {
        if (typeof val === 'number') return val;
        if (!val) return 0;
        return parseFloat(String(val).replace(/,/g, '')) || 0;
    },

    saveDaily: async (store, date, metrics) => {
        // metrics = array of items from daily file
        // Save as separate document per day per store
        await db.collection('kpi_daily').doc(`${date}_${store}`).set({
            storeCode: store, date, metrics, updatedAt: new Date()
        }, {merge: true});
    },

    saveStoreRecap: async (record) => {
        // record = { storeCode, saleDateKeyYmd, tesp, ... }
        await db.collection('store_recap').doc(`${record.saleDateKeyYmd}_${record.storeCode}`).set(record, {merge: true});
    },

    getReportData: async (store, start, end) => {
        try {
            // Fetch Daily KPI
            const kpiSnap = await db.collection('kpi_daily')
                .where('storeCode', '==', store)
                .where('date', '>=', start)
                .where('date', '<=', end)
                .get();
            
            const data = {};
            
            kpiSnap.forEach(doc => {
                const d = doc.data();
                // Sum up values
                let tesp = 0, tx = 0, bb = 0, newMem = 0;
                const breakdown = [];

                if(d.metrics) {
                    d.metrics.forEach(m => {
                        tesp += (m.tesp || 0);
                        tx += (m.tx || 0);
                        bb += (m.bb || 0);
                        newMem += (m.newMember || 0);
                        
                        // Keep top items for Weekly Breakdown
                        if(m.tesp > 0) breakdown.push(m);
                    });
                }

                // Sort breakdown by TESP desc
                breakdown.sort((a,b) => b.tesp - a.tesp);

                data[d.date] = {
                    tesp, tx, bb, newMem,
                    atv: tx > 0 ? tesp/tx : 0,
                    breakdown: breakdown.slice(0, 5) // Top 5 for display
                };
            });

            return { ok: true, data };
        } catch(e) {
            return { ok: false, msg: e.message };
        }
    }
};

const authService = {
    login: async (e, p) => await auth.signInWithEmailAndPassword(e, p),
    logout: () => auth.signOut().then(() => location.reload())
};

/**
 * ==========================================
 * 2. FILE PROCESSOR (Revised Logic)
 * ==========================================
 */
const processor = {
    process: async (files, type) => {
        ui.loading(true, `Processing ${files.length} files...`);
        let success = 0, fail = 0, errors = [];

        for(let f of files) {
            try {
                const ext = f.name.split('.').pop().toLowerCase();
                const buffer = await f.arrayBuffer();
                
                if(ext === 'zip') {
                    const zip = new JSZip();
                    const content = await zip.loadAsync(buffer);
                    for(let name in content.files) {
                        if(!content.files[name].dir && name.match(/\.(xls|xlsx)$/i)) {
                            // Filter files inside ZIP
                            if(type==='storeRecap' && !name.toLowerCase().includes('storerecap')) continue;
                            const zipData = await content.files[name].async("arraybuffer");
                            await processor.parseExcel(zipData, type, name);
                            success++;
                        }
                    }
                } else {
                    await processor.parseExcel(buffer, type, f.name);
                    success++;
                }
            } catch(e) {
                fail++;
                errors.push(`${f.name}: ${e.message}`);
                console.error(e);
            }
        }
        
        ui.loading(false);
        alert(`Completed: ${success}, Failed: ${fail}\n${errors.join('\n')}`);
        if(success > 0) ui.nav('report');
    },

    parseExcel: async (buffer, type, fname) => {
        const wb = XLSX.read(buffer, {type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        
        if(type === 'daily') {
            await processor.parseDaily(ws, fname);
        } else if(type === 'storeRecap') {
            await processor.parseRecap(ws, fname);
        } else if(type === 'saleByDept') {
            // Logic for SaleByDept here
        } else if(type === 'storeMaster') {
            // Logic for Master
        }
    },

    // --- REVISED DAILY KPI PARSER ---
    parseDaily: async (ws, fname) => {
        // Convert to Array of Arrays for safe index access
        const rows = XLSX.utils.sheet_to_json(ws, {header:1});
        
        // Find Header Row "Key KPI"
        const hIdx = rows.findIndex(r => r && r[4] === 'Key KPI');
        if(hIdx === -1) throw new Error("Invalid Daily KPI Format");

        // Meta Data
        const store = String(rows[1]?.[1] || '4340').trim();
        const dateStr = processor.fmtDate(rows[2]?.[1]);

        // Column Indices (0-based from array)
        // User requirement: BB=3, TESP=8, NewMem=11, Tx=13
        // Array index: A=0, B=1, C=2, D=3...
        const idxName = 4;
        const idxBB = 3;
        const idxTESP = 8; 
        const idxNewMem = 11; 
        const idxTx = 13; 

        const data = [];
        for(let i=hIdx+1; i<rows.length; i++) {
            const r = rows[i];
            if(!r || !r[idxName]) continue;

            const tesp = dbService.cleanNum(r[idxTESP]);
            const tx = dbService.cleanNum(r[idxTx]);
            const atv = tx > 0 ? tesp/tx : 0;

            data.push({
                kpiName: r[idxName],
                bb: dbService.cleanNum(r[idxBB]),
                tesp: tesp,
                newMember: dbService.cleanNum(r[idxNewMem]),
                tx: tx,
                atv: parseFloat(atv.toFixed(2))
            });
        }

        await dbService.saveDaily(store, dateStr, data);
    },

    // --- REVISED RECAP PARSER ---
    parseRecap: async (ws, fname) => {
        // Heuristic Search
        const find = (key, offsetCol=1) => {
            const range = XLSX.utils.decode_range(ws['!ref']);
            for(let r=range.s.r; r<=range.e.r; r++) {
                for(let c=range.s.c; c<=range.e.c; c++) {
                    const cell = ws[XLSX.utils.encode_cell({r,c})];
                    if(cell && String(cell.v).trim() === key) {
                        // Look ahead
                        for(let k=1; k<=15; k++) {
                            const valCell = ws[XLSX.utils.encode_cell({r, c:c+k})];
                            if(valCell && (typeof valCell.v === 'number' || String(valCell.v).match(/^[0-9,.]+$/))) {
                                return dbService.cleanNum(valCell.v);
                            }
                        }
                    }
                }
            }
            return 0;
        };

        const storeCode = '4340'; // Simplify detection
        // Date logic...
        let dateStr = "2025-11-15"; // Default fallback
        // Try find date cell
        // ...

        const tesp = find('TESP');
        const tespAfter = find('TESP AFTER COUPON');
        // Customer often at AT17
        const custCell = ws['AT17'] || ws['AU17'];
        const customer = custCell ? dbService.cleanNum(custCell.v) : 0;
        
        const atv = customer > 0 ? tespAfter/customer : 0;

        await dbService.saveStoreRecap({
            storeCode, 
            saleDateKeyYmd: dateStr.replace(/-/g,''), 
            tesp, tespAfter, customer, atv 
        });
    },

    fmtDate: (v) => {
        if(!v) return new Date().toISOString().split('T')[0];
        const d = new Date(v);
        const y = d.getFullYear();
        const m = String(d.getMonth()+1).padStart(2,'0');
        const day = String(d.getDate()).padStart(2,'0');
        return `${y}-${m}-${day}`;
    }
};

/**
 * ==========================================
 * 3. UI CONTROLLER (Report Views)
 * ==========================================
 */
const ui = {
    state: { 
        viewDate: new Date('2025-11-01'), 
        reportType: 'daily', 
        reportView: 'monthly' // daily, weekly, monthly
    },

    init: () => {
        auth.onAuthStateChanged(user => {
            document.getElementById('loading-screen').classList.add('hidden');
            if(user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                ui.nav('upload');
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
            }
        });

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            try { 
                await authService.login(document.getElementById('email').value, document.getElementById('password').value);
            } catch(err) { alert(err.message); }
        };
    },

    nav: (page) => {
        const content = document.getElementById('content-area');
        content.innerHTML = '';
        
        // Update Buttons
        const btnUp = document.getElementById('nav-upload');
        const btnRep = document.getElementById('nav-report');
        
        if(page === 'upload') {
            btnUp.classList.add('bg-chrome', 'text-white'); btnUp.classList.remove('text-gray-600');
            btnRep.classList.remove('bg-chrome', 'text-white'); btnRep.classList.add('text-gray-600');
            ui.renderUpload(content);
        } else {
            btnRep.classList.add('bg-chrome', 'text-white'); btnRep.classList.remove('text-gray-600');
            btnUp.classList.remove('bg-chrome', 'text-white'); btnUp.classList.add('text-gray-600');
            ui.renderReport(content);
        }
    },

    renderUpload: (area) => {
        const { reportType } = ui.state;
        const btnCls = (t) => `block w-full text-left px-4 py-3 rounded-lg font-semibold transition ${reportType===t ? 'bg-chrome text-white shadow-md' : 'bg-white text-gray-600 hover:bg-gray-50'}`;

        area.innerHTML = `
        <div class="flex flex-col md:flex-row gap-6 max-w-6xl mx-auto animate-fade">
            <div class="w-full md:w-1/4 space-y-2">
                <button class="${btnCls('daily')}" onclick="ui.setType('daily')">Daily Sale KPI</button>
                <button class="${btnCls('weekly')}" onclick="ui.setType('weekly')">Weekly Sale KPI</button>
                <button class="${btnCls('storeRecap')}" onclick="ui.setType('storeRecap')">Store Recap</button>
                <button class="${btnCls('saleByDept')}" onclick="ui.setType('saleByDept')">Sale By Dept</button>
                <div class="h-px bg-gray-300 my-2"></div>
                <button class="${btnCls('storeMaster')}" onclick="ui.setType('storeMaster')">Store Master</button>
            </div>
            <div class="w-full md:w-3/4 bg-white p-8 rounded-2xl border border-gray-200 shadow-sm">
                <h2 class="text-2xl font-bold text-gray-800 mb-4">Upload ${reportType}</h2>
                <div class="border-2 border-dashed border-gray-300 rounded-xl h-48 flex flex-col items-center justify-center text-gray-400 cursor-pointer hover:bg-blue-50 transition" onclick="document.getElementById('fIn').click()">
                    <span class="text-sm font-bold">Click to select files</span>
                </div>
                <input type="file" id="fIn" class="hidden" multiple onchange="processor.process(this.files, ui.state.reportType)">
            </div>
        </div>`;
    },

    setType: (t) => { ui.state.reportType = t; ui.nav('upload'); },
    
    // --- REPORT RENDER LOGIC ---
    renderReport: async (area) => {
        const { reportView, viewDate } = ui.state;
        const viewBtn = (v, l) => `<button onclick="ui.setView('${v}')" class="px-4 py-2 rounded-lg font-bold text-sm transition ${reportView===v?'bg-chrome text-white':'bg-white text-gray-600 border hover:bg-gray-50'}">${l}</button>`;
        
        area.innerHTML = `
        <div class="max-w-7xl mx-auto animate-fade">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800">Reports</h2>
                <div class="flex gap-2">
                    ${viewBtn('daily', 'Daily')}
                    ${viewBtn('weekly', 'Weekly')}
                    ${viewBtn('monthly', 'Monthly')}
                </div>
            </div>
            <div id="report-body">Loading...</div>
        </div>`;

        if(reportView === 'monthly') await ui.renderMonthlyView();
        else if(reportView === 'weekly') await ui.renderWeeklyView();
        else await ui.renderDailyView();
    },

    setView: (v) => { ui.state.reportView = v; ui.nav('report'); },

    // 1. MONTHLY VIEW
    renderMonthlyView: async () => {
        const d = ui.state.viewDate;
        const y = d.getFullYear(), m = d.getMonth();
        const startStr = `${y}-${String(m+1).padStart(2,'0')}-01`;
        const lastDay = new Date(y, m+1, 0).getDate();
        const endStr = `${y}-${String(m+1).padStart(2,'0')}-${lastDay}`;

        const res = await dbService.getReportData('4340', startStr, endStr);
        
        let html = `
        <div class="bg-white p-4 rounded-xl border shadow-sm mb-4 flex justify-between items-center">
            <h3 class="font-bold text-lg">${d.toLocaleString('default',{month:'long'})} ${y}</h3>
            <div class="flex gap-2">
                <button onclick="ui.chgDate(-1, 'month')" class="px-3 py-1 border rounded hover:bg-gray-50">Prev</button>
                <button onclick="ui.chgDate(1, 'month')" class="px-3 py-1 border rounded hover:bg-gray-50">Next</button>
            </div>
        </div>
        <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b">
                    <tr><th class="p-4">Date</th><th class="p-4 text-right">TESP</th><th class="p-4 text-right">Tx</th><th class="p-4 text-right">ATV</th></tr>
                </thead>
                <tbody>`;
        
        if(!res.ok) html += `<tr><td colspan="4" class="p-6 text-center text-red-500">${res.msg}</td></tr>`;
        else {
            for(let i=1; i<=lastDay; i++) {
                const dayKey = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const r = res.data[dayKey];
                const dateObj = new Date(dayKey);
                const dayName = dateObj.toLocaleDateString('en-US', {weekday:'short'});
                
                // Highlight Sunday
                const isSun = dateObj.getDay() === 0 ? 'text-red-500' : 'text-gray-500';

                if(r) {
                    html += `<tr class="border-b hover-row">
                        <td class="p-4 font-medium flex gap-2"><span class="${isSun} w-8">${dayName}</span> ${i}</td>
                        <td class="p-4 text-right font-bold text-gray-800">${r.tesp.toLocaleString()}</td>
                        <td class="p-4 text-right text-gray-600">${r.tx}</td>
                        <td class="p-4 text-right text-blue-600">${r.atv.toFixed(0)}</td>
                    </tr>`;
                } else {
                    html += `<tr class="border-b hover-row"><td class="p-4 flex gap-2"><span class="${isSun} w-8">${dayName}</span> ${i}</td><td colspan="3" class="p-4 text-center text-xs text-gray-300">No Data</td></tr>`;
                }
            }
        }
        html += `</tbody></table></div>`;
        document.getElementById('report-body').innerHTML = html;
    },

    // 2. WEEKLY VIEW (Expanded)
    renderWeeklyView: async () => {
        const d = ui.state.viewDate;
        const day = d.getDay(); // 0=Sun
        const start = new Date(d); start.setDate(d.getDate() - day);
        const end = new Date(start); end.setDate(start.getDate() + 6);
        
        const sStr = processor.fmtDate(start);
        const eStr = processor.fmtDate(end);

        const res = await dbService.getReportData('4340', sStr, eStr);
        
        let html = `
        <div class="bg-white p-4 rounded-xl border shadow-sm mb-4 flex justify-between items-center">
            <h3 class="font-bold text-lg">Week: ${sStr} to ${eStr}</h3>
            <div class="flex gap-2">
                <button onclick="ui.chgDate(-7, 'day')" class="px-3 py-1 border rounded hover:bg-gray-50">Prev Wk</button>
                <button onclick="ui.chgDate(7, 'day')" class="px-3 py-1 border rounded hover:bg-gray-50">Next Wk</button>
            </div>
        </div>
        <div class="space-y-4">`;

        if(!res.ok) { html += `<p class="text-red-500">${res.msg}</p>`; }
        else {
            for(let i=0; i<7; i++) {
                const cur = new Date(start); cur.setDate(start.getDate()+i);
                const k = processor.fmtDate(cur);
                const r = res.data[k];
                
                html += `<div class="bg-white border rounded-xl p-5 shadow-sm hover:shadow-md transition">
                    <div class="flex justify-between items-center mb-3 border-b pb-2">
                        <span class="font-bold text-lg text-gray-800">${cur.toLocaleDateString('en-US', {weekday:'long', day:'numeric', month:'short'})}</span>
                        ${r ? '<span class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs font-bold">Complete</span>' : '<span class="bg-gray-100 text-gray-400 px-2 py-1 rounded text-xs">Missing</span>'}
                    </div>`;
                
                if(r) {
                    // Top Row
                    html += `<div class="grid grid-cols-4 gap-4 mb-4 text-sm">
                        <div class="text-center"><div class="text-xs text-gray-400">TESP</div><div class="font-bold text-lg">${r.tesp.toLocaleString()}</div></div>
                        <div class="text-center"><div class="text-xs text-gray-400">Tx</div><div class="font-bold text-lg">${r.tx}</div></div>
                        <div class="text-center"><div class="text-xs text-gray-400">ATV</div><div class="font-bold text-lg text-blue-600">${r.atv.toFixed(0)}</div></div>
                        <div class="text-center"><div class="text-xs text-gray-400">New Mem</div><div class="font-bold text-lg text-green-600">${r.newMem}</div></div>
                    </div>
                    <!-- Breakdown (Expand area) -->
                    <div class="bg-gray-50 p-3 rounded-lg border border-gray-100">
                        <p class="text-xs font-bold text-gray-500 uppercase mb-2">Top Contributors</p>
                        <div class="grid grid-cols-1 gap-1 text-sm">`;
                        if(r.breakdown) {
                            r.breakdown.forEach(b => {
                                html += `<div class="flex justify-between"><span class="text-gray-600">${b.kpiName}</span> <span class="font-medium">${b.tesp.toLocaleString()}</span></div>`;
                            });
                        }
                    html += `</div></div>`;
                } else {
                    html += `<div class="text-center text-gray-300 py-4">No Data</div>`;
                }
                html += `</div>`;
            }
        }
        html += `</div>`;
        document.getElementById('report-body').innerHTML = html;
    },

    // 3. DAILY VIEW
    renderDailyView: async () => {
        const d = ui.state.viewDate;
        const ds = processor.fmtDate(d);
        const res = await dbService.getReportData('4340', ds, ds);
        const r = res.ok ? res.data[ds] : null;

        let html = `
        <div class="bg-white p-4 rounded-xl border shadow-sm mb-4 flex justify-between items-center">
            <h3 class="font-bold text-lg">${d.toLocaleDateString('en-US',{weekday:'long', day:'numeric', month:'long', year:'numeric'})}</h3>
            <div class="flex gap-2">
                <button onclick="ui.chgDate(-1, 'day')" class="px-3 py-1 border rounded hover:bg-gray-50">Prev Day</button>
                <button onclick="ui.chgDate(1, 'day')" class="px-3 py-1 border rounded hover:bg-gray-50">Next Day</button>
            </div>
        </div>`;

        if(r) {
            html += `
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                <div class="bg-white p-6 rounded-xl border shadow-sm text-center">
                    <p class="text-gray-400 text-xs font-bold uppercase">Total Sales</p>
                    <p class="text-4xl font-bold text-blue-600 mt-2">${r.tesp.toLocaleString()}</p>
                </div>
                <div class="bg-white p-6 rounded-xl border shadow-sm text-center">
                    <p class="text-gray-400 text-xs font-bold uppercase">Transactions</p>
                    <p class="text-4xl font-bold text-gray-800 mt-2">${r.tx}</p>
                </div>
                <div class="bg-white p-6 rounded-xl border shadow-sm text-center">
                    <p class="text-gray-400 text-xs font-bold uppercase">Boots Brand</p>
                    <p class="text-4xl font-bold text-green-600 mt-2">${r.bb.toLocaleString()}</p>
                </div>
            </div>
            
            <div class="bg-white rounded-xl border shadow-sm overflow-hidden">
                <div class="px-6 py-4 border-b bg-gray-50 font-bold text-gray-700">Detailed Breakdown</div>
                <table class="w-full text-left">
                    <thead class="border-b"><tr><th class="p-4">KPI Name</th><th class="p-4 text-right">TESP</th><th class="p-4 text-right">Tx</th></tr></thead>
                    <tbody>`;
                    if(r.breakdown) {
                        r.breakdown.forEach(b => {
                            html += `<tr class="border-b hover-row"><td class="p-4">${b.kpiName}</td><td class="p-4 text-right font-medium">${b.tesp.toLocaleString()}</td><td class="p-4 text-right text-gray-600">${b.tx}</td></tr>`;
                        });
                    }
            html += `</tbody></table></div>`;
        } else {
            html += `<div class="text-center py-20 bg-white rounded-xl border text-gray-400">No Data for this date</div>`;
        }
        document.getElementById('report-body').innerHTML = html;
    },

    chgDate: (n, type) => {
        const d = ui.state.viewDate;
        if(type === 'month') d.setMonth(d.getMonth() + n);
        else d.setDate(d.getDate() + n);
        ui.state.viewDate = new Date(d);
        ui.nav('report'); // Refresh
    },
    
    loading: (s, t) => {
        const el = document.getElementById('loading-screen');
        if(s) el.classList.remove('hidden'); else el.classList.add('hidden');
    }
};

// Initialize App
ui.init();
</script>
</body>
</html>
