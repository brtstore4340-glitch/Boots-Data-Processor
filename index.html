<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPI System V8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .animate-fade { animation: fadeIn 0.4s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        tr:hover td { background-color: #f1f5f9; }
    </style>
    
    <!-- Import Map for Modules -->
    <script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
        }
    }
    </script>
</head>
<body class="h-screen flex flex-col overflow-hidden text-slate-700">

    <!-- Loading -->
    <div id="loading-screen" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center">
        <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-600 border-t-transparent mb-4"></div>
        <p class="text-sm text-gray-500 font-medium">System Loading...</p>
        <p class="text-xs text-red-400 mt-2 hidden" id="server-warn">If stuck, ensure you are running on a Server (http://)</p>
    </div>

    <!-- Login -->
    <div id="login-screen" class="hidden fixed inset-0 bg-slate-50 z-40 flex items-center justify-center">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-96 border border-slate-200">
            <div class="text-center mb-6">
                <h1 class="text-2xl font-bold text-slate-800">KPI Login</h1>
            </div>
            <form id="login-form" class="space-y-4">
                <input type="email" id="email" class="w-full px-4 py-3 rounded-lg border border-slate-300" placeholder="admin@kpi.com" required>
                <input type="password" id="password" class="w-full px-4 py-3 rounded-lg border border-slate-300" placeholder="Password" required>
                <button type="submit" class="w-full bg-slate-900 text-white py-3 rounded-lg font-bold hover:bg-slate-800">Sign In</button>
            </form>
        </div>
    </div>

    <!-- App -->
    <div id="app-screen" class="hidden flex-1 flex flex-col h-full">
        <nav class="bg-white border-b h-16 shrink-0 px-6 flex justify-between items-center z-10">
            <div class="font-bold text-lg text-slate-800">KPI Processor</div>
            <div class="flex gap-2 bg-slate-100 p-1 rounded-lg">
                <button id="nav-upload" class="px-4 py-1.5 rounded-md text-sm font-medium transition">Upload</button>
                <button id="nav-report" class="px-4 py-1.5 rounded-md text-sm font-medium transition">Report</button>
            </div>
            <button id="logout-btn" class="text-slate-400 hover:text-red-500">Logout</button>
        </nav>
        <main id="content-area" class="flex-1 overflow-auto p-6 bg-slate-50"></main>
    </div>

    <!-- Main Entry Point -->
    <script type="module" src="js/app.js"></script>
    <script>
        // Simple check for file:// protocol
        if(window.location.protocol === 'file:') {
            setTimeout(() => document.getElementById('server-warn').classList.remove('hidden'), 2000);
        }
    </script>
</body>
</html>
