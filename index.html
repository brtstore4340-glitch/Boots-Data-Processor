<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPI Data Processor</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; /* Slate-50 */
        }
        /* Gemini Blue / Google Blue Tone */
        .chrome-blue { color: #1a73e8; }
        .bg-chrome-blue { background-color: #1a73e8; }
        
        .btn-primary { 
            @apply bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-4 py-2 rounded-lg hover:shadow-lg transition transform hover:-translate-y-0.5; 
        }

        /* Simple Fade In Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>

    <!-- Import Map for Firebase -->
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
          "firebase/analytics": "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js"
        }
      }
    </script>
</head>
<body class="h-screen flex flex-col overflow-hidden text-gray-700">

    <!-- Loading Overlay -->
    <div id="loading-screen" class="fixed inset-0 bg-white/90 backdrop-blur-sm z-50 flex flex-col items-center justify-center hidden">
        <div class="relative">
            <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-600 mb-4"></div>
            <div class="absolute top-0 left-0 h-16 w-16 rounded-full border-t-4 border-b-4 border-indigo-400 animate-pulse opacity-50"></div>
        </div>
        <p class="text-gray-600 font-medium animate-pulse mt-4">Processing Data...</p>
    </div>

    <!-- Login Screen -->
    <div id="login-screen" class="hidden flex-1 flex items-center justify-center bg-gradient-to-br from-blue-50 to-white">
        <div class="bg-white p-10 rounded-3xl shadow-2xl w-96 border border-white/50">
            <div class="text-center mb-8">
                <div class="inline-block p-3 rounded-full bg-blue-50 mb-4">
                     <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                </div>
                <h1 class="text-3xl font-bold text-gray-800 tracking-tight">KPI System</h1>
                <p class="text-gray-400 text-sm mt-2">Sign in to access dashboard</p>
            </div>
            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" id="email" class="block w-full rounded-xl border-gray-200 bg-gray-50 p-3 text-sm focus:border-blue-500 focus:bg-white focus:ring-blue-500 transition" placeholder="admin@kpi.com" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="password" class="block w-full rounded-xl border-gray-200 bg-gray-50 p-3 text-sm focus:border-blue-500 focus:bg-white focus:ring-blue-500 transition" placeholder="••••••••" required>
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-3 px-4 rounded-xl hover:shadow-lg hover:from-blue-700 hover:to-indigo-700 transition duration-200 font-bold shadow-blue-200">
                    Sign In
                </button>
            </form>
        </div>
    </div>

    <!-- Main Application (Hidden by default) -->
    <div id="app-screen" class="hidden flex-1 flex flex-col h-full">
        <!-- Navbar -->
        <nav class="bg-white/80 backdrop-blur-md shadow-sm border-b border-gray-100 z-10 sticky top-0">
            <div class="max-w-7xl mx-auto px-4">
                <div class="flex justify-between h-16">
                    <div class="flex items-center gap-8">
                        <div class="flex items-center gap-2">
                             <div class="w-8 h-8 bg-gradient-to-tr from-blue-600 to-indigo-500 rounded-lg flex items-center justify-center text-white font-bold shadow-lg shadow-blue-200">K</div>
                             <span class="text-xl font-bold text-gray-800 tracking-tight">KPI Processor</span>
                        </div>
                        <div class="hidden md:flex space-x-2">
                            <button data-page="upload" class="nav-btn text-gray-500 hover:text-blue-600 hover:bg-blue-50 px-4 py-2 rounded-lg text-sm font-medium transition-all">Upload</button>
                            <button data-page="report" class="nav-btn text-gray-500 hover:text-blue-600 hover:bg-blue-50 px-4 py-2 rounded-lg text-sm font-medium transition-all">Reports</button>
                            <button data-page="config" id="nav-config" class="hidden nav-btn text-gray-500 hover:text-blue-600 hover:bg-blue-50 px-4 py-2 rounded-lg text-sm font-medium transition-all">Config</button>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="text-right hidden sm:block">
                            <p id="user-name" class="text-sm font-bold text-gray-700">User</p>
                            <div class="flex justify-end">
                                <p id="user-role" class="text-[10px] uppercase tracking-wider font-bold text-blue-600 bg-blue-50 px-2 rounded-full">Role</p>
                            </div>
                        </div>
                        <button id="logout-btn" class="text-gray-400 hover:text-red-500 p-2 rounded-full hover:bg-red-50 transition">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Content Area -->
        <main id="content-area" class="flex-1 overflow-auto p-6">
            <!-- Content will be injected here by app.js -->
        </main>
    </div>

    <!-- External Libraries (SheetJS & JSZip) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <!-- App Modules -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
